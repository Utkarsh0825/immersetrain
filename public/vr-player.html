<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ImmerseTrain VR Player</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    #a-root { position: absolute; inset: 0; }
  </style>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <div id="a-root">
    <a-scene
      id="it-scene"
      embedded
      style="height:100%;width:100%;position:absolute;top:0;left:0"
      renderer="colorManagement: true"
      loading-screen="enabled: false"
      vr-mode-ui="enabled: true"
      device-orientation-permission-ui="enabled: true"
    >
      <video
        id="trainingvideo"
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
        preload="auto"
        style="position:absolute;top:0;left:0;width:1px;height:1px;opacity:0.01;pointer-events:none"
      ></video>
      <a-assets>
        <canvas id="freezeCanvas" width="1280" height="640"></canvas>
      </a-assets>
      <a-videosphere
        id="immersive-sphere"
        src="#trainingvideo"
        rotation="0 -90 0"
        visible="true"
      ></a-videosphere>
      <a-entity id="camera-rig" position="0 1.6 0">
        <a-camera id="main-camera" look-controls="pointerLockEnabled: false" wasd-controls="enabled: false">
          <a-entity id="vr-start-screen" visible="false">
            <a-plane
              position="0 0 -2"
              width="2.5"
              height="1.2"
              material="color: #0d0d18; opacity: 0.95; shader: flat; side: double"
            ></a-plane>
            <a-text value="ImmerseTrain" color="#5B4CFF" align="center" width="3" position="0 0.35 -1.99"></a-text>
            <a-text value="Press trigger or tap to begin training" color="#FFFFFF" align="center" width="2.8" position="0 0 -1.99"></a-text>
            <a-ring
              position="0 -0.35 -1.99"
              radius-inner="0.08"
              radius-outer="0.12"
              color="#5B4CFF"
              material="shader: flat"
              animation="property: scale; to: 1.3 1.3 1; dur: 1000; loop: true; dir: alternate; easing: easeInOutSine"
            ></a-ring>
          </a-entity>
          <a-entity
            id="vr-start-btn"
            class="clickable"
            geometry="primitive: plane; width: 1.8; height: 0.6"
            material="color: #5B4CFF; shader: flat; opacity: 0.95; side: double"
            position="0 0 -2.5"
            visible="false"
          ></a-entity>
          <a-text
            id="vr-start-text"
            value="PRESS TRIGGER OR TAP TO START"
            color="#FFFFFF"
            align="center"
            width="2.6"
            position="0 0 -2.49"
            visible="false"
          ></a-text>
          <a-entity
            id="gaze-cursor"
            cursor="fuse: true; fuseTimeout: 1500"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.014; radiusOuter: 0.02"
            material="color: #FFFFFF; shader: flat; opacity: 0.85"
            animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.5 0.5 0.5; dur: 1500; easing: easeInCubic"
            animation__fusend="property: scale; startEvents: mouseleave; from: 0.5 0.5 0.5; to: 1 1 1; dur: 150"
            raycaster="objects: .clickable; far: 8"
            visible="false"
          ></a-entity>
          <a-entity id="quiz-panel" position="0 -0.25 -1.8" visible="false">
            <a-plane
              id="quiz-bg"
              width="1.42"
              height="0.88"
              material="color: #0d0d18; shader: flat; opacity: 0.95; side: double"
            ></a-plane>
            <a-plane
              width="1.42"
              height="0.04"
              position="0 0.42 0.001"
              material="color: #5B4CFF; shader: flat; opacity: 1; side: double"
            ></a-plane>
            <a-text id="quiz-label" value="QUESTION 1 OF 10" color="#5B4CFF" align="left" anchor="left" width="1.25" position="-0.69 0.33 0.002"></a-text>
            <a-text id="quiz-points" value="+ 10 pts" color="#00D4FF" align="right" anchor="right" width="1.0" position="0.69 0.33 0.002"></a-text>
            <a-text id="quiz-question" value="Loading question..." color="#FFFFFF" align="left" anchor="left" width="1.25" wrap-count="40" position="-0.69 0.15 0.002"></a-text>
            <a-entity id="option-a-btn" class="clickable" position="0 -0.12 0.002">
              <a-plane id="option-a-bg" width="1.34" height="0.17" material="color: #1a1a2e; shader: flat; opacity: 0.98; side: double"></a-plane>
              <a-text id="option-a-label" value="A" color="#5B4CFF" align="left" anchor="left" width="0.3" position="-0.62 0 0.001"></a-text>
              <a-text id="option-a-text" value="Option A" color="#FFFFFF" align="left" anchor="left" width="1.1" wrap-count="38" position="-0.52 0 0.001"></a-text>
            </a-entity>
            <a-entity id="option-b-btn" class="clickable" position="0 -0.33 0.002">
              <a-plane id="option-b-bg" width="1.34" height="0.17" material="color: #1a1a2e; shader: flat; opacity: 0.98; side: double"></a-plane>
              <a-text id="option-b-label" value="B" color="#5B4CFF" align="left" anchor="left" width="0.3" position="-0.62 0 0.001"></a-text>
              <a-text id="option-b-text" value="Option B" color="#FFFFFF" align="left" anchor="left" width="1.1" wrap-count="38" position="-0.52 0 0.001"></a-text>
            </a-entity>
            <a-text id="quiz-feedback" value="" color="#22c55e" align="center" width="1.25" wrap-count="44" position="0 -0.55 0.002" visible="false"></a-text>
          </a-entity>
        </a-camera>
      </a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 10"></a-entity>
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 10"></a-entity>
    </a-scene>
  </div>

  <script>
(function () {
  var CHANNEL = 'IT_VR';
  var parentWin = window.parent;
  var targetOrigin = '*';
  try {
    if (document.referrer) targetOrigin = new URL(document.referrer).origin;
  } catch (e) {}

  function post(type, detail) {
    var o = detail || {};
    o.channel = CHANNEL;
    o.type = type;
    parentWin.postMessage(o, targetOrigin);
  }

  var isQuest = /OculusBrowser|Quest/i.test(navigator.userAgent || '');
  var video = null;
  var scene = null;
  var sphere = null;
  var freezeCanvas = null;
  var vrStartBtn = null;
  var vrStartText = null;
  var vrStartScreen = null;
  var vrVideoStarted = false;
  var lastKnownTime = 0;
  var lastPausedTime = 0;
  var timeGuard = null;
  var freezeGuard = null;
  var frozenAt = 0;
  var inFreeze = false;
  var timeThrottle = 0;
  var videoListenersAttached = false;
  var vrHandlers = { a: null, b: null, aEnter: null, aLeave: null, bEnter: null, bLeave: null };
  var vrEls = {};
  var startHandlers = { click: null, trigger: null, select: null };

  function q(sel) { return document.querySelector(sel); }

  function cacheVrEls() {
    vrEls = {
      panel: q('#quiz-panel'),
      cursor: q('#gaze-cursor'),
      label: q('#quiz-label'),
      points: q('#quiz-points'),
      q: q('#quiz-question'),
      aBtn: q('#option-a-btn'),
      bBtn: q('#option-b-btn'),
      aBg: q('#option-a-bg'),
      bBg: q('#option-b-bg'),
      aText: q('#option-a-text'),
      bText: q('#option-b-text'),
      feedback: q('#quiz-feedback')
    };
  }

  function setVrQuizVisible(visible) {
    var v = visible ? 'true' : 'false';
    if (vrEls.panel) vrEls.panel.setAttribute('visible', v);
    if (vrEls.cursor) vrEls.cursor.setAttribute('visible', v);
    if (!visible && vrEls.feedback) {
      vrEls.feedback.setAttribute('visible', 'false');
      vrEls.feedback.setAttribute('value', '');
    }
  }

  function hideVrQuiz() {
    setVrQuizVisible(false);
  }

  function showVrQuiz(payload) {
    var els = vrEls;
    if (!els.panel) return;

    els.label.setAttribute('value', 'QUESTION ' + Math.min(payload.questionIndex + 1, payload.totalQuestions) + ' OF ' + payload.totalQuestions);
    els.points.setAttribute('value', '+ ' + (payload.points != null ? payload.points : 10) + ' pts');
    els.q.setAttribute('value', payload.questionText || '');
    els.aText.setAttribute('value', payload.optionA || '');
    els.bText.setAttribute('value', payload.optionB || '');

    els.aBg.setAttribute('material', 'color: #1a1a2e; shader: flat; opacity: 0.98');
    els.bBg.setAttribute('material', 'color: #1a1a2e; shader: flat; opacity: 0.98');
    els.feedback.setAttribute('visible', 'false');
    els.feedback.setAttribute('value', '');
    els.cursor.setAttribute('visible', 'true');

    if (els.aBtn && vrHandlers.a) els.aBtn.removeEventListener('click', vrHandlers.a);
    if (els.bBtn && vrHandlers.b) els.bBtn.removeEventListener('click', vrHandlers.b);
    if (els.aBtn && vrHandlers.aEnter) els.aBtn.removeEventListener('mouseenter', vrHandlers.aEnter);
    if (els.aBtn && vrHandlers.aLeave) els.aBtn.removeEventListener('mouseleave', vrHandlers.aLeave);
    if (els.bBtn && vrHandlers.bEnter) els.bBtn.removeEventListener('mouseenter', vrHandlers.bEnter);
    if (els.bBtn && vrHandlers.bLeave) els.bBtn.removeEventListener('mouseleave', vrHandlers.bLeave);

    function answer(chosen) {
      var correct = payload.correctOption;
      var isCorrect = chosen === correct;
      var chosenBg = chosen === 'a' ? els.aBg : els.bBg;
      var correctBg = correct === 'a' ? els.aBg : els.bBg;
      var pts = payload.points != null ? payload.points : 10;
      if (isCorrect) {
        chosenBg.setAttribute('material', 'color: #166534; shader: flat; opacity: 0.98');
        els.feedback.setAttribute('value', 'Correct! +' + pts);
        els.feedback.setAttribute('color', '#22c55e');
      } else {
        chosenBg.setAttribute('material', 'color: #7f1d1d; shader: flat; opacity: 0.98');
        correctBg.setAttribute('material', 'color: #166534; shader: flat; opacity: 0.98');
        var msg = (payload.explanation || 'Incorrect').slice(0, 110);
        els.feedback.setAttribute('value', msg);
        els.feedback.setAttribute('color', '#ef4444');
      }
      els.feedback.setAttribute('visible', 'true');
      els.cursor.setAttribute('visible', 'false');

      post('VR_QUIZ_ANSWER', { questionId: payload.id, chosenOption: chosen });
      setTimeout(hideVrQuiz, 2500);
    }

    vrHandlers.aEnter = function () { els.aBg.setAttribute('material', 'color: #2a2a4e; shader: flat; opacity: 0.98'); };
    vrHandlers.aLeave = function () { els.aBg.setAttribute('material', 'color: #1a1a2e; shader: flat; opacity: 0.98'); };
    vrHandlers.bEnter = function () { els.bBg.setAttribute('material', 'color: #2a2a4e; shader: flat; opacity: 0.98'); };
    vrHandlers.bLeave = function () { els.bBg.setAttribute('material', 'color: #1a1a2e; shader: flat; opacity: 0.98'); };
    vrHandlers.a = function () { answer('a'); };
    vrHandlers.b = function () { answer('b'); };

    els.aBtn.addEventListener('mouseenter', vrHandlers.aEnter);
    els.aBtn.addEventListener('mouseleave', vrHandlers.aLeave);
    els.bBtn.addEventListener('mouseenter', vrHandlers.bEnter);
    els.bBtn.addEventListener('mouseleave', vrHandlers.bLeave);
    els.aBtn.addEventListener('click', vrHandlers.a);
    els.bBtn.addEventListener('click', vrHandlers.b);

    setVrQuizVisible(true);
  }

  function freezeFrame() {
    if (!video || !sphere || !freezeCanvas) return;
    var t = video.currentTime || lastKnownTime;
    frozenAt = t;
    inFreeze = true;
    try {
      var ctx = freezeCanvas.getContext('2d');
      if (ctx) ctx.drawImage(video, 0, 0, freezeCanvas.width, freezeCanvas.height);
    } catch (e) {}
    try { sphere.setAttribute('src', '#freezeCanvas'); } catch (e) {}
    try { video.muted = true; } catch (e) {}
    if (freezeGuard) clearInterval(freezeGuard);
    freezeGuard = setInterval(function () {
      if (!video || !inFreeze) return;
      var target = frozenAt;
      try {
        if (isFinite(target) && target > 0.05 && Math.abs(video.currentTime - target) > 0.35) {
          video.currentTime = target;
        }
      } catch (e) {}
    }, 200);
  }

  function resumeFromFreeze(skipSeconds) {
    skipSeconds = skipSeconds == null ? 0.6 : skipSeconds;
    if (!video || !sphere) return;
    var target = Math.max(0, (frozenAt || video.currentTime || lastKnownTime) + skipSeconds);
    inFreeze = false;
    if (freezeGuard) {
      clearInterval(freezeGuard);
      freezeGuard = null;
    }
    function swapBack() {
      try { sphere.setAttribute('src', '#trainingvideo'); } catch (e) {}
      try { video.muted = false; } catch (e) {}
      video.play().catch(function () {});
    }
    function onSeeked() { swapBack(); }
    video.addEventListener('seeked', onSeeked, { once: true });
    try {
      video.currentTime = target;
    } catch (e) {
      swapBack();
    }
    setTimeout(swapBack, 300);
  }

  function startVrVideoFromGesture() {
    if (!scene || !video || !sphere) return;
    if (vrVideoStarted) return;
    try {
      if (scene.is && !scene.is('vr-mode')) return;
    } catch (e) {}
    vrVideoStarted = true;
    try {
      vrStartBtn.setAttribute('visible', 'false');
      vrStartText.setAttribute('visible', 'false');
    } catch (e) {}
    try { sphere.setAttribute('src', '#trainingvideo'); } catch (e) {}
    setTimeout(function () {
      try { video.muted = false; } catch (e) {}
      video.play().then(function () {}).catch(function () {
        try { video.muted = true; } catch (e2) {}
        video.play().catch(function () {});
        setTimeout(function () {
          try { video.muted = false; } catch (e3) {}
        }, 600);
      });
    }, 300);
  }

  function wireVr() {
    function onEnterVr() {
      post('IN_VR', { value: true });
      if (isQuest) {
        vrVideoStarted = false;
        try {
          vrStartScreen.setAttribute('visible', 'false');
          vrStartBtn.setAttribute('visible', 'true');
          vrStartText.setAttribute('visible', 'true');
        } catch (e) {}
        try { sphere.setAttribute('src', ''); } catch (e) {}
        try { video.muted = true; } catch (e) {}
        try {
          if (video && !video.paused) video.pause();
        } catch (e) {}
      }
    }
    function onExitVr() {
      post('IN_VR', { value: false });
      hideVrQuiz();
      if (isQuest) {
        vrVideoStarted = false;
        try {
          vrStartBtn.setAttribute('visible', 'false');
          vrStartText.setAttribute('visible', 'false');
        } catch (e) {}
        try { sphere.setAttribute('src', '#trainingvideo'); } catch (e) {}
      }
    }
    scene.addEventListener('enter-vr', onEnterVr);
    scene.addEventListener('exit-vr', onExitVr);

    startHandlers.click = startVrVideoFromGesture;
    startHandlers.trigger = startVrVideoFromGesture;
    startHandlers.select = startVrVideoFromGesture;
    scene.addEventListener('click', startHandlers.click);
    scene.addEventListener('triggerdown', startHandlers.trigger);
    scene.addEventListener('select', startHandlers.select);
    if (vrStartBtn) {
      vrStartBtn.addEventListener('click', startHandlers.click);
      vrStartBtn.addEventListener('triggerdown', startHandlers.trigger);
    }
    try {
      if (scene.is && scene.is('vr-mode')) onEnterVr();
    } catch (e) {}
  }

  function playWithRetries(muted, done) {
    var attempt = 0;
    function tryPlay() {
      try { video.muted = !!muted; } catch (e) {}
      video.play().then(function () { done(); }).catch(function () {
        attempt++;
        if (attempt < 4) setTimeout(tryPlay, 350);
        else done();
      });
    }
    tryPlay();
  }

  function startPlaybackSequence() {
    if (!video) return;
    playWithRetries(true, function () {
      requestAnimationFrame(function () {
        try { video.muted = false; } catch (e) {}
        video.play().catch(function () {});
      });
    });
  }

  function attachVideo() {
    if (videoListenersAttached) return;
    videoListenersAttached = true;
    video.addEventListener('timeupdate', function () {
      lastKnownTime = video.currentTime;
      var now = Date.now();
      if (now - timeThrottle < 200) return;
      timeThrottle = now;
      post('TIME_UPDATE', { time: video.currentTime });
    });
    video.addEventListener('error', function () {
      var t = video.currentSrc || video.src;
      if (t) {
        video.src = '';
        video.src = t;
        video.load();
      }
    });
  }

  function onMessage(ev) {
    if (ev.origin !== window.location.origin) return;
    var d = ev.data;
    if (!d || d.channel !== CHANNEL) return;

    switch (d.type) {
      case 'INIT':
        if (!video) return;
        video.src = d.videoUrl || '';
        try {
          sphere.setAttribute('src', '#trainingvideo');
        } catch (e) {}
        video.load();
        attachVideo();
        cacheVrEls();
        post('PLAYER_READY', {});
        break;
      case 'START_PLAYBACK':
        startPlaybackSequence();
        break;
      case 'PLAY': {
        var tSave = video.currentTime || lastPausedTime || lastKnownTime;
        if (timeGuard) {
          clearInterval(timeGuard);
          timeGuard = null;
        }
        try {
          if (isFinite(tSave) && tSave > 0.05 && video.currentTime < Math.max(0, tSave - 0.15)) {
            video.currentTime = tSave;
          }
        } catch (e) {}
        video.play().catch(function () {});
        setTimeout(function () {
          try {
            if (isFinite(tSave) && tSave > 0.05 && video.currentTime < Math.max(0, tSave - 0.25)) {
              video.currentTime = tSave;
            }
          } catch (e2) {}
        }, 260);
        break;
      }
      case 'PAUSE': {
        var saved = video.currentTime || lastKnownTime;
        lastPausedTime = saved;
        video.pause();
        if (timeGuard) clearInterval(timeGuard);
        timeGuard = setInterval(function () {
          try {
            if (isFinite(saved) && saved > 0.05 && video.currentTime < Math.max(0, saved - 0.6)) {
              video.currentTime = saved;
            }
          } catch (e) {}
        }, 140);
        break;
      }
      case 'SEEK':
        try {
          video.currentTime = Math.max(0, d.timeSeconds || 0);
        } catch (e) {}
        break;
      case 'FREEZE_FRAME':
        freezeFrame();
        break;
      case 'RESUME_FROM_FREEZE':
        resumeFromFreeze(d.skipSeconds);
        break;
      case 'SHOW_VR_QUIZ':
        showVrQuiz(d.payload || {});
        break;
      case 'HIDE_VR_QUIZ':
        hideVrQuiz();
        break;
      default:
        break;
    }
  }

  function boot() {
    scene = q('#it-scene');
    video = q('#trainingvideo');
    sphere = q('#immersive-sphere');
    freezeCanvas = q('#freezeCanvas');
    vrStartBtn = q('#vr-start-btn');
    vrStartText = q('#vr-start-text');
    vrStartScreen = q('#vr-start-screen');

    window.addEventListener('message', onMessage);

    function onSceneReady() {
      post('READY_FOR_INIT', {});
      wireVr();
    }
    if (scene.hasLoaded) onSceneReady();
    else scene.addEventListener('loaded', onSceneReady, { once: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
  </script>
</body>
</html>
